services:
  mongo:
    image: mongo:7
    container_name: rol-and-play-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rolplay_admin
      MONGO_INITDB_ROOT_PASSWORD: rolplay_password
      MONGO_INITDB_DATABASE: rol_and_play
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: rol-and-play-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: rolplay_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: rolplay_password
      ME_CONFIG_MONGODB_URL: mongodb://rolplay_admin:rolplay_password@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo

volumes:
  mongo_data: